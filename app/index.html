<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataset Cadaster — Geospatial &amp; Environmental Data Catalog</title>
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --hdr:#1a2634;
  --hdr-accent:#2e4057;
  --body-bg:#f0f2f5;
  --card-bg:#fff;
  --text:#2c3e50;
  --text-light:#5a6a7a;
  --border:#dce1e8;
  --accent:#2980b9;
  --accent-hover:#1f6da0;
  --green:#27ae60;
  --green-bg:#e8f8f0;
  --yellow:#e67e22;
  --yellow-bg:#fdf3e6;
  --red:#c0392b;
  --red-bg:#fbeaea;
  --blue:#2980b9;
  --blue-bg:#e4f0fa;
  --teal:#16a085;
  --sidebar-w:300px;
  --radius:6px;
  --shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow-hover:0 4px 12px rgba(0,0,0,.12);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
html{font-size:15px}
body{font-family:var(--font);color:var(--text);background:var(--body-bg);min-height:100vh;display:flex;flex-direction:column}

/* ── Header ───────────────────────────────────────────── */
.header{background:var(--hdr);color:#fff;padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.header h1{font-size:1.25rem;font-weight:600;letter-spacing:.3px}
.header h1 span{color:#5dade2;margin-right:6px}
.header-right{margin-left:auto;font-size:.82rem;color:#a0b4c8}

/* ── Stats Bar ────────────────────────────────────────── */
.stats-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:28px;flex-wrap:wrap;font-size:.85rem;color:var(--text-light)}
.stat{display:flex;align-items:center;gap:6px}
.stat strong{color:var(--text);font-size:1.05rem}

/* ── Layout ───────────────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar / Filters ────────────────────────────────── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.sidebar h2{font-size:.9rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text-light);margin-bottom:2px}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group label{font-size:.8rem;font-weight:600;color:var(--text)}
.filter-group input[type="text"],
.filter-group select{
  width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;
  background:#fafbfc;transition:border .2s;font-family:var(--font)
}
.filter-group input:focus,
.filter-group select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(41,128,185,.15)}
.toggle-group{display:flex;gap:0}
.toggle-group button{flex:1;padding:7px 0;font-size:.8rem;border:1px solid var(--border);background:#fafbfc;cursor:pointer;font-family:var(--font);transition:all .15s}
.toggle-group button:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.toggle-group button:last-child{border-radius:0 var(--radius) var(--radius) 0}
.toggle-group button:not(:first-child){border-left:none}
.toggle-group button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-clear{
  padding:8px 14px;font-size:.82rem;border:1px solid var(--border);border-radius:var(--radius);
  background:#fafbfc;cursor:pointer;font-family:var(--font);color:var(--text-light);transition:all .15s;align-self:flex-start
}
.btn-clear:hover{background:#eef1f5;color:var(--text)}
.match-count{font-size:.82rem;color:var(--text-light);margin-top:4px}

/* ── Sort Bar ─────────────────────────────────────────── */
.results-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;flex-wrap:wrap;gap:8px}
.sort-controls{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-light)}
.sort-controls select{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;background:#fff;font-family:var(--font)}

/* ── Content ──────────────────────────────────────────── */
.content{flex:1;padding:0 24px 24px;overflow-y:auto}

/* ── Cards ────────────────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;
  transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column;gap:10px
}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card-title{font-size:1.05rem;font-weight:600}
.card-title a{color:var(--accent);text-decoration:none}
.card-title a:hover{text-decoration:underline}
.badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px
}
.badge-category{background:#e4ecf7;color:#34567a}
.badge-scope{background:#e0f0ee;color:#1a6b5a}
.badge-free{background:var(--green-bg);color:var(--green)}
.badge-freemium{background:var(--yellow-bg);color:var(--yellow)}
.badge-commercial{background:var(--red-bg);color:var(--red)}
.badge-api{background:var(--blue-bg);color:var(--blue)}
.card-desc{font-size:.88rem;color:var(--text-light);line-height:1.45}
.card-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:.78rem;color:var(--text-light)}
.card-meta span::before{margin-right:4px}
.card-meta .m-spatial::before{content:"📐 "}
.card-meta .m-temporal::before{content:"🕐 "}
.card-meta .m-operator::before{content:"🏢 "}
.card-meta .m-formats::before{content:"📁 "}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:1px 7px;background:#f0f2f5;color:var(--text-light);border-radius:8px;font-size:.7rem}

/* ── States ───────────────────────────────────────────── */
.loading,.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.loading .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state h3{font-size:1.1rem;color:var(--text);margin-bottom:6px}

/* ── Mobile Toggle ────────────────────────────────────── */
.filter-toggle{display:none;position:fixed;bottom:20px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.3rem;box-shadow:0 3px 10px rgba(0,0,0,.25);cursor:pointer}

/* ── Category Colors ──────────────────────────────────── */
.badge-cat-satellite-eo{background:#e0eafc;color:#2a5298}
.badge-cat-climate-weather{background:#fde8d0;color:#b45309}
.badge-cat-soil{background:#f0e6d3;color:#7a5c2e}
.badge-cat-hydrology{background:#d6eef8;color:#1a6fa0}
.badge-cat-biosphere-ecology{background:#d9f2e0;color:#2d7a3e}
.badge-cat-dem-elevation{background:#e8e0d4;color:#5c4a2f}
.badge-cat-geology-geophysics{background:#e3dce8;color:#5a3d7a}
.badge-cat-land-use-land-cover{background:#d7edd4;color:#3a6b30}
.badge-cat-admin-boundaries{background:#fce4e4;color:#993333}
.badge-cat-population-urban{background:#fbe5d6;color:#a04a20}
.badge-cat-air-quality{background:#e6e6ef;color:#4a4a72}
.badge-cat-ocean-marine{background:#d4e8f0;color:#1a5276}
.badge-cat-geodesy-insar{background:#dde4ea;color:#3a4f63}
.badge-cat-data-platform{background:#dceef0;color:#2a6e6e}

/* ── Responsive ───────────────────────────────────────── */
@media(max-width:860px){
  .sidebar{position:fixed;left:-320px;top:56px;bottom:0;z-index:150;transition:left .25s ease;box-shadow:4px 0 16px rgba(0,0,0,.15)}
  .sidebar.open{left:0}
  .filter-toggle{display:block}
  .cards{grid-template-columns:1fr}
  .content{padding:0 14px 80px}
  .stats-bar{padding:8px 14px;gap:16px}
}
@media(max-width:480px){
  .header h1{font-size:1rem}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <h1><span>&#9672;</span>Dataset Cadaster</h1>
  <div class="header-right">Geospatial &amp; Environmental Data Catalog</div>
</header>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar">
  <div class="stat">Platforms: <strong id="statTotal">—</strong></div>
  <div class="stat">Free: <strong id="statFree">—</strong></div>
  <div class="stat">With API: <strong id="statApi">—</strong></div>
</div>

<!-- Main Layout -->
<div class="main">

  <!-- Sidebar Filters -->
  <aside class="sidebar" id="sidebar">
    <h2>Filters</h2>

    <div class="filter-group">
      <label for="searchBox">Search</label>
      <input type="text" id="searchBox" placeholder="Name, description, tags, operator…">
    </div>

    <div class="filter-group">
      <label for="filterCategory">Category</label>
      <select id="filterCategory">
        <option value="">All categories</option>
        <option value="satellite-eo">Satellite / EO</option>
        <option value="climate-weather">Climate &amp; Weather</option>
        <option value="soil">Soil</option>
        <option value="hydrology">Hydrology</option>
        <option value="biosphere-ecology">Biosphere &amp; Ecology</option>
        <option value="dem-elevation">DEM / Elevation</option>
        <option value="geology-geophysics">Geology &amp; Geophysics</option>
        <option value="land-use-land-cover">Land Use / Land Cover</option>
        <option value="admin-boundaries">Admin Boundaries</option>
        <option value="population-urban">Population &amp; Urban</option>
        <option value="air-quality">Air Quality</option>
        <option value="ocean-marine">Ocean &amp; Marine</option>
        <option value="geodesy-insar">Geodesy / InSAR</option>
        <option value="data-platform">Data Platform</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filterScope">Scope</label>
      <select id="filterScope">
        <option value="">All scopes</option>
        <option value="global">Global</option>
        <option value="europe">Europe</option>
        <option value="regional">Regional</option>
        <option value="national">National</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filterCost">Cost</label>
      <select id="filterCost">
        <option value="">All</option>
        <option value="free">Free</option>
        <option value="freemium">Freemium</option>
        <option value="commercial">Commercial</option>
      </select>
    </div>

    <div class="filter-group">
      <label>API Support</label>
      <div class="toggle-group" id="apiToggle">
        <button class="active" data-value="">All</button>
        <button data-value="yes">Yes</button>
        <button data-value="no">No</button>
      </div>
    </div>

    <button class="btn-clear" id="btnClear">Clear filters</button>
    <div class="match-count" id="matchCount"></div>
  </aside>

  <!-- Results -->
  <section class="content" id="content">
    <div class="results-header">
      <div></div>
      <div class="sort-controls">
        <span>Sort by:</span>
        <select id="sortSelect">
          <option value="alpha">Alphabetical</option>
          <option value="category">Category</option>
          <option value="scope">Scope</option>
        </select>
      </div>
    </div>
    <div id="resultsArea">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <div>Loading datasets…</div>
      </div>
    </div>
  </section>
</div>

<!-- Mobile filter toggle -->
<button class="filter-toggle" id="filterToggle" aria-label="Toggle filters">&#9776;</button>

<script>
(function(){
  "use strict";

  /* ── State ───────────────────────────────────────── */
  let allData = [];
  let filtered = [];
  let searchTimer = null;

  /* ── DOM refs ────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const searchBox      = $("searchBox");
  const filterCategory = $("filterCategory");
  const filterScope    = $("filterScope");
  const filterCost     = $("filterCost");
  const apiToggle      = $("apiToggle");
  const sortSelect     = $("sortSelect");
  const resultsArea    = $("resultsArea");
  const matchCount     = $("matchCount");
  const loadingState   = $("loadingState");
  const btnClear       = $("btnClear");
  const sidebar        = $("sidebar");
  const filterToggle   = $("filterToggle");

  let apiValue = "";

  /* ── Fetch Data ──────────────────────────────────── */
  fetch("../datasets.json")
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      allData = Array.isArray(data) ? data : (data.datasets || []);
      updateStats();
      applyFilters();
    })
    .catch(err => {
      loadingState.innerHTML =
        '<div class="empty-state"><h3>Could not load datasets</h3><p>Make sure <code>datasets.json</code> is placed in the parent directory.</p><p style="margin-top:8px;font-size:.8rem;color:#aaa;">(' + err.message + ')</p></div>';
    });

  /* ── Stats ───────────────────────────────────────── */
  function updateStats(){
    $("statTotal").textContent = allData.length;
    $("statFree").textContent  = allData.filter(d => d.cost === "free").length;
    $("statApi").textContent   = allData.filter(d => d.apiSupport).length;
  }

  /* ── Filtering ───────────────────────────────────── */
  function applyFilters(){
    const q   = searchBox.value.trim().toLowerCase();
    const cat = filterCategory.value;
    const sco = filterScope.value;
    const cos = filterCost.value;
    const api = apiValue;

    filtered = allData.filter(d => {
      if(cat && d.category !== cat) return false;
      if(sco && d.scope !== sco) return false;
      if(cos && d.cost !== cos) return false;
      if(api === "yes" && !d.apiSupport) return false;
      if(api === "no"  && d.apiSupport)  return false;
      if(q){
        const haystack = [
          d.name, d.description, d.operator,
          ...(d.tags || [])
        ].join(" ").toLowerCase();
        const words = q.split(/\s+/);
        if(!words.every(w => haystack.includes(w))) return false;
      }
      return true;
    });

    sortResults();
    render();
  }

  /* ── Sorting ─────────────────────────────────────── */
  function sortResults(){
    const mode = sortSelect.value;
    filtered.sort((a,b) => {
      if(mode === "category") return (a.category||"").localeCompare(b.category||"") || (a.name||"").localeCompare(b.name||"");
      if(mode === "scope")    return (a.scope||"").localeCompare(b.scope||"") || (a.name||"").localeCompare(b.name||"");
      return (a.name||"").localeCompare(b.name||"");
    });
  }

  /* ── Render ──────────────────────────────────────── */
  function render(){
    matchCount.textContent = filtered.length + " of " + allData.length + " datasets";

    if(!allData.length && !loadingState.querySelector(".empty-state")){
      return; // still loading
    }

    if(!filtered.length){
      resultsArea.innerHTML = '<div class="empty-state"><h3>No datasets match your filters</h3><p>Try broadening your search or clearing filters.</p></div>';
      return;
    }

    const html = '<div class="cards">' + filtered.map(cardHTML).join("") + '</div>';
    resultsArea.innerHTML = html;
  }

  function esc(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

  function cardHTML(d){
    const costClass = d.cost === "free" ? "badge-free" : d.cost === "freemium" ? "badge-freemium" : "badge-commercial";
    const catClass  = "badge-cat-" + (d.category || "");
    const catLabel  = formatCategory(d.category);

    let badges = '<span class="badge ' + catClass + '">' + esc(catLabel) + '</span>';
    if(d.scope) badges += '<span class="badge badge-scope">' + esc(d.scope) + '</span>';
    badges += '<span class="badge ' + costClass + '">' + esc(d.cost || "?") + '</span>';
    if(d.apiSupport) badges += '<span class="badge badge-api">API</span>';

    let meta = "";
    if(d.spatialResolution)  meta += '<span class="m-spatial">' + esc(d.spatialResolution) + '</span>';
    if(d.temporalResolution) meta += '<span class="m-temporal">' + esc(d.temporalResolution) + '</span>';
    if(d.operator)           meta += '<span class="m-operator">' + esc(d.operator) + '</span>';
    if(d.formats)            meta += '<span class="m-formats">' + esc(d.formats) + '</span>';

    let tags = "";
    if(d.tags && d.tags.length){
      tags = '<div class="tags">' + d.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join("") + '</div>';
    }

    return '<div class="card">' +
      '<div class="card-title"><a href="' + esc(d.url) + '" target="_blank" rel="noopener">' + esc(d.name) + '</a></div>' +
      '<div class="badges">' + badges + '</div>' +
      (d.description ? '<div class="card-desc">' + esc(d.description) + '</div>' : '') +
      (meta ? '<div class="card-meta">' + meta + '</div>' : '') +
      tags +
    '</div>';
  }

  function formatCategory(c){
    if(!c) return "";
    return c.replace(/-/g," ").replace(/\b\w/g, l => l.toUpperCase())
            .replace(/\bEo\b/,"EO").replace(/\bDem\b/,"DEM").replace(/\bInsar\b/,"InSAR");
  }

  /* ── Event Wiring ────────────────────────────────── */
  searchBox.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 300);
  });

  [filterCategory, filterScope, filterCost, sortSelect].forEach(el => {
    el.addEventListener("change", applyFilters);
  });

  apiToggle.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if(!btn) return;
    apiToggle.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    apiValue = btn.dataset.value;
    applyFilters();
  });

  btnClear.addEventListener("click", () => {
    searchBox.value = "";
    filterCategory.value = "";
    filterScope.value = "";
    filterCost.value = "";
    apiValue = "";
    apiToggle.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    apiToggle.querySelector('[data-value=""]').classList.add("active");
    sortSelect.value = "alpha";
    applyFilters();
  });

  filterToggle.addEventListener("click", () => sidebar.classList.toggle("open"));
  document.addEventListener("click", e => {
    if(window.innerWidth <= 860 && sidebar.classList.contains("open")
       && !sidebar.contains(e.target) && e.target !== filterToggle){
      sidebar.classList.remove("open");
    }
  });

})();
</script>
</body>
</html>
