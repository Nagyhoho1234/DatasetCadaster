<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.navbar-links{flex-wrap:wrap}

/* ── Main Content ─────────────────────────────────────── */
.main{max-width:1280px;margin:0 auto;padding:24px;width:100%}

/* ── Search & Filter Bar ──────────────────────────────── */
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:240px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.92rem;background:var(--card-bg);color:var(--text);transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--text-light);opacity:.7}
.filter-tags{display:flex;gap:6px;flex-wrap:wrap}
.filter-tag{padding:5px 14px;border-radius:16px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-light);font-size:.78rem;cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none}
.filter-tag:hover{border-color:var(--accent);color:var(--accent)}
.filter-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.results-count{font-size:.82rem;color:var(--text-light);margin-bottom:16px}

/* ── Method Cards Grid ────────────────────────────────── */
.methods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:960px){.methods-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.methods-grid{grid-template-columns:1fr}.search-bar{flex-direction:column}.header{flex-wrap:wrap;height:auto;padding:12px 24px}}

.method-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .15s,transform .15s;cursor:pointer}
.method-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.method-card.expanded{grid-column:1/-1;cursor:default}

.card-front{padding:20px}
.card-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.card-name{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:6px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.card-tag{padding:1px 8px;border-radius:10px;font-size:.68rem;font-weight:600;letter-spacing:.2px;text-transform:uppercase}
.tag-hydrology{background:#e4f0fa;color:#2471a3}
.tag-ecology{background:#e8f8f0;color:#1e8449}
.tag-urban{background:#fdf3e6;color:#b97015}
.tag-geology{background:#f0e6fa;color:#6c3483}
.tag-climate{background:#fdf3e6;color:#b97015}
.tag-agriculture{background:#e8f8f0;color:#1e8449}
.tag-remote-sensing{background:#e4f0fa;color:#2471a3}
.tag-hazard{background:#fbeaea;color:#a93226}
.tag-marine{background:#e4f0fa;color:#21618c}
.tag-forestry{background:#e8f8f0;color:#1a6d35}
.tag-air-quality{background:#f0e6fa;color:#6c3483}
[data-theme="dark"] .tag-hydrology{background:#1a2a3e;color:#5ab0d4}
[data-theme="dark"] .tag-ecology{background:#1a3020;color:#5cb870}
[data-theme="dark"] .tag-urban{background:#332a14;color:#d4a050}
[data-theme="dark"] .tag-geology{background:#28203a;color:#9a80b8}
[data-theme="dark"] .tag-climate{background:#332a14;color:#d4a050}
[data-theme="dark"] .tag-agriculture{background:#1a3020;color:#5cb870}
[data-theme="dark"] .tag-remote-sensing{background:#1a2a3e;color:#5ab0d4}
[data-theme="dark"] .tag-hazard{background:#331a1a;color:#cc6666}
[data-theme="dark"] .tag-marine{background:#142838;color:#5a98b8}
[data-theme="dark"] .tag-forestry{background:#1a3020;color:#5cb870}
[data-theme="dark"] .tag-air-quality{background:#28203a;color:#9a80b8}

.card-cost{font-size:.82rem;color:var(--text-light)}
.card-cost strong{color:var(--green);font-weight:700}
.card-cost.has-cost strong{color:var(--yellow)}

.card-brief{font-size:.82rem;color:var(--text-light);margin-top:4px;line-height:1.4}

/* ── Expanded Detail Panel ────────────────────────────── */
.card-detail{display:none;border-top:1px solid var(--border);padding:20px 24px;animation:slideDown .2s ease}
.method-card.expanded .card-detail{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}

.detail-section{margin-bottom:16px}
.detail-section h4{font-size:.82rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-light);margin-bottom:8px;font-weight:700}
.dataset-list{list-style:none;display:flex;flex-wrap:wrap;gap:8px}
.dataset-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);font-size:.82rem;font-weight:500;text-decoration:none;transition:all .15s;cursor:pointer;border:1px solid transparent}
.dataset-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.chip-required-free{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.chip-optional-free{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.chip-optional-commercial{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-blue{background:var(--blue)}
.dot-orange{background:var(--yellow)}

.detail-footer{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)}
.cost-badge{padding:6px 16px;border-radius:var(--radius);font-size:.88rem;font-weight:700}
.cost-free{background:var(--green-bg);color:var(--green)}
.cost-paid{background:var(--yellow-bg);color:var(--yellow)}
.processing-info{font-size:.82rem;color:var(--text-light)}
.processing-info strong{color:var(--text);font-weight:600}
.btn-open-catalog{padding:8px 18px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font:inherit;font-size:.82rem;font-weight:600;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-open-catalog:hover{background:var(--accent-hover)}
.btn-collapse{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card-bg);color:var(--text-light);cursor:pointer;font:inherit;font-size:.78rem;transition:all .15s;margin-left:auto}
.btn-collapse:hover{border-color:var(--accent);color:var(--accent)}

/* ── Legend ────────────────────────────────────────────── */
.legend{display:flex;gap:20px;margin-bottom:20px;padding:12px 18px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.8rem;color:var(--text-light);flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>

    processing:"NoiseModelling (open-source) + QGIS",
    required:[
      {name:"Road network with traffic (OSM)",q:"OpenStreetMap"},
      {name:"Building footprints with height (OSM / national)",q:"building footprints"},
      {name:"DEM / DSM",q:"DEM"},
      {name:"Land cover (for ground absorption)",q:"CORINE"}
    ],
    optional:[
      {name:"Noise measurement stations",q:"noise monitoring",commercial:false},
      {name:"Population (for exposure assessment)",q:"WorldPop",commercial:false},
      {name:"Railway network",q:"railway",commercial:false}
    ]
  }
];

/* ── Collect all unique tags for filter buttons ──────── */
var allTags = [];
METHODS.forEach(function(m){
  m.tags.forEach(function(t){
    if(allTags.indexOf(t)===-1) allTags.push(t);
  });
});
allTags.sort();

var activeFilters = [];

/* ── Render filter tag buttons ───────────────────────── */
var filterContainer = document.getElementById("filterTags");
allTags.forEach(function(tag){
  var btn = document.createElement("button");
  btn.className = "filter-tag";
  btn.textContent = tag;
  btn.setAttribute("data-tag",tag);
  btn.addEventListener("click",function(){
    var idx = activeFilters.indexOf(tag);
    if(idx===-1){activeFilters.push(tag);btn.classList.add("active")}
    else{activeFilters.splice(idx,1);btn.classList.remove("active")}
    renderGrid();
  });
  filterContainer.appendChild(btn);
});

/* ── Build a single method card HTML ─────────────────── */
function buildCard(m){
  var tagHtml = m.tags.map(function(t){return '<span class="card-tag tag-'+t+'">'+t+'</span>'}).join("");
  var hasCost = m.cost !== "0";

  var reqChips = m.required.map(function(d){
    return '<a class="dataset-chip chip-required-free" href="index.html#q='+encodeURIComponent(d.q)+'" target="_blank" title="Required (free) \u2014 click to find in Catalog"><span class="chip-dot dot-green"></span>'+escHtml(d.name)+'</a>';
  }).join("");

  var optChips = m.optional.map(function(d){
    var cls = d.commercial ? "chip-optional-commercial" : "chip-optional-free";
    var dotCls = d.commercial ? "dot-orange" : "dot-blue";
    var label = d.commercial ? "Optional (commercial)" : "Optional (free)";
    return '<a class="dataset-chip '+cls+'" href="index.html#q='+encodeURIComponent(d.q)+'" target="_blank" title="'+label+' \u2014 click to find in Catalog"><span class="chip-dot '+dotCls+'"></span>'+escHtml(d.name)+'</a>';
  }).join("");

  var allQ = m.required.map(function(d){return d.q}).concat(m.optional.map(function(d){return d.q}));
  var catalogLink = "index.html#q="+encodeURIComponent(allQ[0]);

  return '<div class="method-card" data-id="'+m.id+'" data-tags="'+m.tags.join(",")+'" data-search="'+escAttr(m.name+" "+m.brief+" "+m.tags.join(" ")+" "+m.required.map(function(d){return d.name}).join(" ")+" "+m.optional.map(function(d){return d.name}).join(" "))+'">'
    +'<div class="card-front" onclick="toggleCard(\''+m.id+'\')">'
    +'<span class="card-icon">'+m.icon+'</span>'
    +'<div class="card-name">'+escHtml(m.name)+'</div>'
    +'<div class="card-tags">'+tagHtml+'</div>'
    +'<div class="card-brief">'+escHtml(m.brief)+'</div>'
    +'<div class="card-cost'+(hasCost?" has-cost":"")+'">Est. annual cost: <strong>'+escHtml(m.costLabel)+'</strong></div>'
    +'</div>'
    +'<div class="card-detail">'
    +'<div class="detail-section"><h4>Required Datasets</h4><div class="dataset-list">'+reqChips+'</div></div>'
    +'<div class="detail-section"><h4>Optional / Enhanced Datasets</h4><div class="dataset-list">'+optChips+'</div></div>'
    +'<div class="detail-footer">'
    +'<span class="cost-badge '+(hasCost?"cost-paid":"cost-free")+'">'+escHtml(m.costLabel)+'</span>'
    +'<span class="processing-info"><strong>Processing:</strong> '+escHtml(m.processing)+'</span>'
    +'<a class="btn-open-catalog" href="'+catalogLink+'" target="_blank">Open in Catalog \u2192</a>'
    +'<button class="btn-collapse" onclick="event.stopPropagation();collapseCard(\''+m.id+'\')">Collapse</button>'
    +'</div>'
    +'</div>'
    +'</div>';
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escAttr(s){return s.replace(/"/g,"&quot;").toLowerCase()}

/* ── Render grid with search & filter ────────────────── */
function renderGrid(){
  var query = document.getElementById("methodSearch").value.toLowerCase().trim();
  var grid = document.getElementById("methodsGrid");
  var count = 0;
  var html = "";

  METHODS.forEach(function(m){
    // Filter by tags
    if(activeFilters.length > 0){
      var match = false;
      for(var i=0;i<activeFilters.length;i++){
        if(m.tags.indexOf(activeFilters[i])!==-1){match=true;break}
      }
      if(!match) return;
    }
    // Filter by search
    var searchStr = (m.name+" "+m.brief+" "+m.tags.join(" ")+" "+m.required.map(function(d){return d.name}).join(" ")+" "+m.optional.map(function(d){return d.name}).join(" ")).toLowerCase();
    if(query && searchStr.indexOf(query)===-1) return;

    html += buildCard(m);
    count++;
  });

  grid.innerHTML = html;
  document.getElementById("resultsCount").textContent = count+" method"+(count!==1?"s":"")+" shown";
}

/* ── Toggle card expand/collapse ─────────────────────── */
window.toggleCard = function(id){
  var card = document.querySelector('.method-card[data-id="'+id+'"]');
  if(!card) return;
  if(card.classList.contains("expanded")){
    card.classList.remove("expanded");
  } else {
    // Collapse any other expanded card
    var prev = document.querySelector(".method-card.expanded");
    if(prev) prev.classList.remove("expanded");
    card.classList.add("expanded");
    setTimeout(function(){card.scrollIntoView({behavior:"smooth",block:"nearest"})},50);
  }
};

window.collapseCard = function(id){
  var card = document.querySelector('.method-card[data-id="'+id+'"]');
  if(card) card.classList.remove("expanded");
};

/* ── Search listener ─────────────────────────────────── */
document.getElementById("methodSearch").addEventListener("input",renderGrid);

/* Dark mode handled by shared.js (dcToggleDark) */

/* ── Initial render ──────────────────────────────────── */
renderGrid();

})();
</script>
