<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataset Cadaster — Map Explorer</title>
<link rel="stylesheet" href="shared.css">
<script src="shared.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ── Map page overrides ──────────────────────────────── */
body{height:100vh;overflow:hidden}

/* ── Navigation (map uses a bigger navbar) ───────────── */
.navbar{background:var(--hdr);height:56px;z-index:1000;box-shadow:0 2px 6px rgba(0,0,0,.25);flex-shrink:0;border-bottom:none}
.navbar-brand{font-size:1.25rem;font-weight:600;letter-spacing:.3px;color:#fff;text-decoration:none;margin-right:0}
.navbar-brand span{color:#5dade2;margin-right:6px}
.navbar-links{margin-left:auto;display:flex;gap:24px;font-size:.9rem}
.navbar-links a{padding:0}
.navbar-links a:hover,.navbar-links a.active{color:#fff;text-decoration:none;background:none}

/* ── Main Layout ──────────────────────────────────────── */
.main-container{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Map ──────────────────────────────────────────────── */
#map{flex:1;z-index:1}

/* ── Stats Overlay ────────────────────────────────────── */
.stats-overlay{
  position:absolute;top:12px;left:60px;z-index:800;
  background:rgba(255,255,255,.95);border-radius:var(--radius);
  padding:10px 16px;box-shadow:var(--shadow);font-size:.88rem;
  pointer-events:none;border:1px solid var(--border);
  max-width:320px;
}
.stats-overlay strong{color:var(--accent)}

/* ── Sidebar ──────────────────────────────────────────── */
.sidebar{
  width:380px;flex-shrink:0;background:var(--card-bg);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:500;overflow:hidden;
  transition:transform .3s ease;
}
.sidebar.collapsed{transform:translateX(100%);position:absolute;right:0;top:0;bottom:0}

.sidebar-header{
  padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-header h2{font-size:1.1rem;font-weight:700;margin-bottom:10px;color:var(--text)}
.sidebar-search{
  width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);
  font:inherit;font-size:.88rem;background:var(--body-bg);color:var(--text);
}
.sidebar-search:focus{outline:none;border-color:var(--accent)}

.sidebar-controls{
  padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;
}
.toggle-btn{
  padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);
  cursor:pointer;font:inherit;font-size:.8rem;background:var(--card-bg);color:var(--text);
  transition:all .2s;
}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.sidebar-results{
  flex:1;overflow-y:auto;padding:12px 16px;
}
.sidebar-results::-webkit-scrollbar{width:6px}
.sidebar-results::-webkit-scrollbar-thumb{background:#c0c8d0;border-radius:3px}

.result-count{font-size:.82rem;color:var(--text-light);margin-bottom:10px;font-weight:600}

/* ── Dataset Cards ────────────────────────────────────── */
.ds-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;transition:box-shadow .2s,border-color .2s;
}
.ds-card:hover{box-shadow:var(--shadow-hover);border-color:var(--accent)}
.ds-card.ds-national{background:#e8f4fc !important;border-left:4px solid #2980b9 !important}
[data-theme="dark"] .ds-card.ds-national{background:rgba(41,128,185,.18) !important;border-left:4px solid #4ba3d9 !important}
.ds-card h3{font-size:.92rem;font-weight:700;margin-bottom:6px;color:var(--text);line-height:1.3}
.ds-card h3 a{color:inherit;text-decoration:none}
.ds-card h3 a:hover{color:var(--accent);text-decoration:underline}
.ds-card p{font-size:.8rem;color:var(--text-light);line-height:1.45;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ds-badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.72rem;font-weight:600}
.badge-scope{background:#e8f8f0;color:#1e7a4a}
.badge-cost-free{background:#e8f8f0;color:#27ae60}
.badge-cost-paid{background:#fdf3e6;color:#b45309}
.badge-cost-freemium{background:#e4f0fa;color:#2471a3}
.badge-category{background:#e4f0fa;color:#1a5276;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-country{background:#fdf3e6;color:#7a5c2e}

/* ── Toggle sidebar button ────────────────────────────── */
.sidebar-toggle{
  position:absolute;right:380px;top:50%;z-index:600;
  transform:translateY(-50%);
  background:var(--card-bg);border:1px solid var(--border);border-right:none;
  border-radius:var(--radius) 0 0 var(--radius);
  padding:12px 6px;cursor:pointer;box-shadow:var(--shadow);
  font-size:1rem;color:var(--text-light);transition:right .3s ease;
}
.sidebar-toggle:hover{color:var(--accent)}
.sidebar.collapsed ~ .sidebar-toggle{right:0}

/* ── Empty state ──────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;display:block}
.empty-state p{font-size:.88rem;line-height:1.5}

/* ── Region rectangles ────────────────────────────────── */
.europe-rect{stroke:var(--accent);stroke-width:2;fill:rgba(41,128,185,.08);cursor:pointer}

/* ── Auto-detect banner ──────────────────────────────── */
.auto-detect-banner{
  padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--blue-bg);font-size:.82rem;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;
}
.auto-detect-banner .detect-label{font-weight:600;color:var(--accent)}
.auto-detect-banner .detect-counts{color:var(--text-light);font-size:.76rem;margin-top:2px}
.auto-detect-banner .show-all-toggle{
  padding:4px 10px;border-radius:var(--radius);border:1px solid var(--accent);
  cursor:pointer;font:inherit;font-size:.75rem;background:var(--card-bg);color:var(--accent);
  transition:all .2s;white-space:nowrap;
}
.auto-detect-banner .show-all-toggle:hover,
.auto-detect-banner .show-all-toggle.active{background:var(--accent);color:#fff}

/* ── Pulse animation for auto-detected marker ────────── */
@keyframes marker-pulse{
  0%{box-shadow:0 0 0 0 rgba(41,128,185,.6)}
  70%{box-shadow:0 0 0 18px rgba(41,128,185,0)}
  100%{box-shadow:0 0 0 0 rgba(41,128,185,0)}
}
.leaflet-marker-pulse{
  animation:marker-pulse 1s ease-out 2;
}

/* ── Responsive ───────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{width:320px}
  .sidebar-toggle{right:320px}
  .sidebar.collapsed ~ .sidebar-toggle{right:0}
}
@media(max-width:640px){
  .sidebar{position:absolute;right:0;top:0;bottom:0;width:100%;max-width:360px}
  .sidebar.collapsed{transform:translateX(100%)}
  .sidebar-toggle{right:0;display:none}
  .navbar-links{gap:14px;font-size:.82rem}
  .stats-overlay{left:10px;right:60px;font-size:.8rem}
}
</style>

    </div>

    </div>
    <div class="sidebar-results" id="results">

        <p>Click a country marker on the map to see available datasets, or use the search box above.</p>
      </div>
    </div>
  </div>
</div>

/* ── Color scale for markers ──────────────────────────── */
function getColor(count){
  if(count === 0) return "#bdc3c7";
  if(count <= 4) return "#aed6f1";
  if(count <= 8) return "#85c1e9";
  if(count <= 12) return "#5dade2";
  if(count <= 18) return "#2e86c1";
  if(count <= 30) return "#1a5276";
  return "#0b3d5e";
}

function getRadius(count){
  if(count === 0) return 5;
  if(count <= 4) return 7;
  if(count <= 8) return 10;
  if(count <= 12) return 13;
  if(count <= 18) return 17;
  if(count <= 30) return 22;
  return 28;
}

/* ── Create country markers ───────────────────────────── */
function createMarkers(countryCounts){
  Object.keys(COUNTRIES).forEach(function(code){
    var c = COUNTRIES[code];
    var count = countryCounts[code] || 0;
    var marker = L.circleMarker([c.lat, c.lng],{
      radius: getRadius(count),
      fillColor: getColor(count),
      color: "#fff",
      weight: 2,
      opacity: 1,
      fillOpacity: 0.85
    }).addTo(map);

    marker.bindTooltip(
      "<strong>" + c.name + "</strong><br>" + count + " national dataset" + (count !== 1 ? "s" : ""),
      {direction:"top", offset:[0,-8]}
    );

    marker.on("click", function(){
      manualOverride = true;
      showAllOverride = false;
      document.getElementById("btnShowAll").classList.remove("active");
      filterByCountry(code);
    });

    markers[code] = marker;
  });
}

/* ── Filter functions ─────────────────────────────────── */
/* ── Geographic relevance filtering ──────────────────── */
/* Datasets tagged "global" aren't always relevant everywhere.
   Arctic DEM shouldn't show for Italy, Baltic data not for Spain, etc. */
var GEO_EXCLUSIONS = {
  /* dataset ID or name substring → excluded regions/latitudes */
  "arctic": {minLat: 55},           /* Arctic stuff only for lat > 55 */
  "antarctic": {maxLat: -50},
  "icesat": {minLat: 50, maxLat: -50}, /* polar */
  "cryosat": {minLat: 55, maxLat: -55},
  "ice-sheet": {minLat: 55},
  "sea-ice": {minLat: 50, maxLat: -50},
  "arctic-dem": {minLat: 55},
  "permafrost": {minLat: 50},
  "baltic": {region: "baltic", minLat: 53, maxLat: 66, minLon: 10, maxLon: 30},
  "helcom": {region: "baltic", minLat: 53, maxLat: 66, minLon: 10, maxLon: 30},
  "ospar": {region: "neatlantic", minLat: 36, maxLat: 65, minLon: -30, maxLon: 13},
  "black-sea": {minLat: 40, maxLat: 47, minLon: 27, maxLon: 42},
  "mediterranean": {minLat: 30, maxLat: 47, minLon: -6, maxLon: 36},
  "landscan-usa": {countries: ["US"]},
  "us-epa": {countries: ["US"]},
  "airnow": {countries: ["US", "CA", "MX"]},
  "noaa-digital-coast": {countries: ["US"]},
  "uk-defra": {countries: ["GB"]},
  "ukceh": {countries: ["GB"]},
  "cdip": {countries: ["US"]},        /* US wave buoys */
  "usgs-water": {countries: ["US"]},
  "usgs-earthquake": {},               /* earthquakes are global, keep */
  "3dep": {countries: ["US"]},
  "nlcd": {countries: ["US"]},
};

function isGloballyRelevant(d, countryCode, countryObj){
  var id = (d.id || "").toLowerCase();
  var name = (d.name || "").toLowerCase();
  var tags = (d.tags || []).join(" ").toLowerCase();
  var search = id + " " + name + " " + tags;
  var lat = countryObj.lat;
  var lng = countryObj.lng;

  for(var key in GEO_EXCLUSIONS){
    if(search.indexOf(key) === -1) continue;
    var rule = GEO_EXCLUSIONS[key];

    /* Country-specific datasets */
    if(rule.countries && rule.countries.length){
      if(rule.countries.indexOf(countryCode) === -1) return false;
      else return true;
    }

    /* Latitude range checks */
    if(rule.minLat !== undefined && rule.maxLat !== undefined){
      /* Polar — must be above minLat OR below maxLat */
      if(lat < rule.minLat && lat > rule.maxLat) return false;
    } else if(rule.minLat !== undefined){
      if(lat < rule.minLat) return false;
    } else if(rule.maxLat !== undefined){
      if(lat > rule.maxLat) return false;
    }

    /* Bounding box for regional seas */
    if(rule.minLon !== undefined){
      if(lng < rule.minLon || lng > rule.maxLon) return false;
      if(lat < rule.minLat || lat > rule.maxLat) return false;
    }
  }
  return true;
}

function isRegionallyRelevant(d, countryCode, countryObj){
  /* Same logic — regional datasets should also be checked */
  return isGloballyRelevant(d, countryCode, countryObj);
}

function filterByCountry(code, opts){
  opts = opts || {};
  var c = COUNTRIES[code];
  if(!c) return;

  currentFilter = {type:"country", country:code, includeGlobal:true};

  /* Datasets for this country: national + same-country regional/subnational + continental + relevant global */
  filteredDatasets = allDatasets.filter(function(d){
    /* National: only this country */
    if(d.scope === "national" && d.country === code) return true;
    /* Regional/subnational: only if same country */
    if((d.scope === "regional" || d.scope === "subnational") && d.country === code) return true;
    /* Europe-wide: only for European countries */
    if(d.scope === "europe" && c.region === "europe") return true;
    /* Continental: show if same continent */
    if(d.scope === "continental") return true;
    /* Global: filter by geographic relevance */
    if(d.scope === "global") return isGloballyRelevant(d, code, c);
    return false;
  });

  document.getElementById("sidebarTitle").textContent = c.name + " Datasets";
  highlightMarker(code);
  updateAutoDetectBanner(code);
  applySearch();
  updateStats(c.name);

  if(!opts.noPan){
    /* Pan to country */
    map.setView([c.lat, c.lng], 6, {animate:true});
  }

  /* Open sidebar on mobile */
  sidebar.classList.remove("collapsed");
  sidebarToggle.innerHTML = "&#9664;";
}

function filterByRegion(region, opts){
  opts = opts || {};
  currentFilter = {type:"region", country:null, includeGlobal:true};

  /* Use center of Europe for relevance checking */
  var euroCenter = {lat: 50, lng: 15};
  filteredDatasets = allDatasets.filter(function(d){
    if(d.scope === "europe") return true;
    if(d.scope === "continental") return true;
    /* Skip regional/subnational in Europe-wide view — too noisy */
    if(d.scope === "global") return isGloballyRelevant(d, null, euroCenter);
    if(d.scope === "national" && d.country && COUNTRIES[d.country] && COUNTRIES[d.country].region === "europe") return true;
    return false;
  });

  document.getElementById("sidebarTitle").textContent = "European Datasets";
  clearHighlight();
  updateAutoDetectBanner(null, "Europe");
  applySearch();
  updateStats("Europe");

  if(!opts.noPan){
    map.fitBounds(EUROPE_BOUNDS, {padding:[30,30], animate:true});
  }
  sidebar.classList.remove("collapsed");
  sidebarToggle.innerHTML = "&#9664;";
}

/* ── Highlight marker ─────────────────────────────────── */
function highlightMarker(code){

      markers[k].bringToFront();
    } else {
      markers[k].setStyle({weight:2, color:"#fff"});
    }
  });
}

function clearHighlight(){
  Object.keys(markers).forEach(function(k){
    markers[k].setStyle({weight:2, color:"#fff"});
  });
}

/* ── Stats overlay ────────────────────────────────────── */
function updateStats(areaName){
  var el = document.getElementById("statsOverlay");
  if(!areaName){
    var totalNational = allDatasets.filter(function(d){return d.scope==="national";}).length;
    var totalGlobal = allDatasets.filter(function(d){return d.scope==="global";}).length;
    el.innerHTML = "<strong>" + allDatasets.length + "</strong> total datasets | " +
      "<strong>" + totalGlobal + "</strong> global | " +
      "<strong>" + totalNational + "</strong> national";
  } else {
    var natCount = filteredDatasets.filter(function(d){return d.scope==="national";}).length;
    var euCount = filteredDatasets.filter(function(d){return d.scope==="europe"||d.scope==="regional"||d.scope==="continental";}).length;
    var globCount = filteredDatasets.filter(function(d){return d.scope==="global";}).length;
    var parts = [];
    if(natCount) parts.push(natCount + " national");
    if(euCount) parts.push(euCount + " regional");
    if(globCount) parts.push(globCount + " global");
    el.innerHTML = "<strong>" + filteredDatasets.length + "</strong> datasets for <strong>" + areaName + "</strong>" + (parts.length ? " (" + parts.join(" + ") + ")" : "");
  }
}

/* ── Search ───────────────────────────────────────────── */
var searchBox = document.getElementById("searchBox");
searchBox.addEventListener("input", function(){
  var q = this.value.trim().toLowerCase();

  if(!q && currentFilter.type === null){
    /* No filter, no search: show nothing or do country search */
    clearFilter();
    return;
  }

  if(currentFilter.type === null && q){
    /* Search across all datasets */
    filteredDatasets = allDatasets.filter(function(d){
      return matchSearch(d, q);
    });
    document.getElementById("sidebarTitle").textContent = "Search Results";
    updateStats("search: \"" + q + "\"");
  }

  applySearch();

  /* Also filter markers visibility */
  filterMarkers(q);
});

function matchSearch(d, q){
  var searchable = [d.name, d.description, d.category, d.country, d.scope,
    d.operator, d.dataType, (d.tags||[]).join(" ")].join(" ").toLowerCase();
  return searchable.indexOf(q) !== -1;
}

function filterMarkers(q){
  if(!q){
    Object.keys(markers).forEach(function(k){ markers[k].setStyle({opacity:1,fillOpacity:0.85}); });
    return;
  }
  Object.keys(markers).forEach(function(k){
    var c = COUNTRIES[k];
    var nameMatch = c.name.toLowerCase().indexOf(q) !== -1 || k.toLowerCase().indexOf(q) !== -1;
    markers[k].setStyle({opacity: nameMatch ? 1 : 0.3, fillOpacity: nameMatch ? 0.85 : 0.2});
  });
}

function applySearch(){
  var q = searchBox.value.trim().toLowerCase();
  var toShow = filteredDatasets;

  /* Hide global datasets if toggle is off */
  if(!showGlobalInList && currentFilter.type !== "global"){
    toShow = toShow.filter(function(d){ return d.scope !== "global"; });
  }

  if(q && currentFilter.type !== null){
    toShow = toShow.filter(function(d){ return matchSearch(d, q); });
  }

  /* Sort: national first, then europe/regional, then global */
  toShow.sort(function(a,b){
    var order = {national:0, europe:1, regional:1, continental:2, global:3};
    return (order[a.scope]||3) - (order[b.scope]||3);
  });

  renderResults(toShow);
}

/* ── Render dataset cards ─────────────────────────────── */
function renderResults(datasets){
  var container = document.getElementById("results");

  if(!datasets || datasets.length === 0){
    container.innerHTML = '<div class="empty-state"><span class="icon">&#128269;</span>' +
      '<p>No datasets found. Try a different search or click another country.</p></div>';
    return;
  }

  var html = '<div class="result-count">' + datasets.length + ' dataset' + (datasets.length !== 1 ? 's' : '') + '</div>';

  datasets.forEach(function(d){
    var costClass = d.cost === "free" ? "badge-cost-free" : (d.cost === "freemium" ? "badge-cost-freemium" : "badge-cost-paid");
    var catLabel = (d.category || "").replace(/-/g," ");

    var isNational = d.scope === "national";
    html += '<div class="ds-card' + (isNational ? ' ds-national' : '') + '">' +
      '<h3><a href="' + (d.url || "#") + '" target="_blank" rel="noopener">' + escHtml(d.name) + '</a></h3>' +
      '<p>' + escHtml(d.description || "") + '</p>' +
      '<div class="ds-badges">' +
        '<span class="badge badge-scope">' + escHtml(d.scope || "") + '</span>' +
        '<span class="badge ' + costClass + '">' + escHtml(d.cost || "") + '</span>' +
        '<span class="badge badge-category">' + escHtml(catLabel) + '</span>' +
        (d.country ? '<span class="badge badge-country">' + escHtml(d.country) + '</span>' : '') +
      '</div>' +
    '</div>';
  });

  container.innerHTML = html;
}

function escHtml(s){
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

/* ── Auto-detect banner update ────────────────────────── */
function updateAutoDetectBanner(countryCode, regionLabel){
  var banner = document.getElementById("autoDetectBanner");
  var label = document.getElementById("detectLabel");
  var counts = document.getElementById("detectCounts");

  if(!countryCode && !regionLabel){
    banner.style.display = "none";
    return;
  }

  banner.style.display = "flex";

  var areaName = regionLabel || (COUNTRIES[countryCode] ? COUNTRIES[countryCode].name : countryCode);
  label.textContent = "Showing datasets for: " + areaName;

  /* Count by scope */
  var cNat=0, cReg=0, cEur=0, cGlob=0;
  filteredDatasets.forEach(function(d){
    if(d.scope==="national") cNat++;
    else if(d.scope==="regional") cReg++;
    else if(d.scope==="europe") cEur++;
    else if(d.scope==="global") cGlob++;
  });
  var parts = [];
  if(cNat) parts.push(cNat + " national");
  if(cReg) parts.push(cReg + " regional");
  if(cEur) parts.push(cEur + " European");
  if(cGlob) parts.push(cGlob + " global");
  counts.textContent = parts.length ? parts.join(" + ") + " datasets" : "No datasets found";
}

/* ── Pulse a marker briefly ──────────────────────────── */
function pulseMarker(code){
  var m = markers[code];
  if(!m || !m._path) return;
  m._path.classList.add("leaflet-marker-pulse");
  setTimeout(function(){ if(m._path) m._path.classList.remove("leaflet-marker-pulse"); }, 2200);
}

/* ── Point-in-bounding-box country detection ─────────── */
function detectCountryAt(lat, lng){
  var matched = [];
  Object.keys(COUNTRIES).forEach(function(code){
    var b = COUNTRIES[code].bounds;
    if(!b) return;
    if(lat >= b.latMin && lat <= b.latMax && lng >= b.lonMin && lng <= b.lonMax){
      /* compute how close center is to centroid (rough priority) */
      var c = COUNTRIES[code];
      var dist = Math.sqrt(Math.pow(lat - c.lat, 2) + Math.pow(lng - c.lng, 2));
      matched.push({code:code, dist:dist});
    }
  });
  if(matched.length === 0) return null;
  /* pick smallest bounding box area among matches, then closest centroid */
  matched.sort(function(a,b){
    var areaA = COUNTRIES[a.code].bounds;
    var areaB = COUNTRIES[b.code].bounds;
    var sA = (areaA.latMax-areaA.latMin)*(areaA.lonMax-areaA.lonMin);
    var sB = (areaB.latMax-areaB.latMin)*(areaB.lonMax-areaB.lonMin);
    if(Math.abs(sA-sB) > 10) return sA - sB; /* prefer smaller country box */
    return a.dist - b.dist;
  });
  return matched[0].code;
}

function detectContinentAt(lat, lng){
  var found = null;
  Object.keys(CONTINENT_BOUNDS).forEach(function(key){
    var b = CONTINENT_BOUNDS[key];
    if(lat >= b.latMin && lat <= b.latMax && lng >= b.lonMin && lng <= b.lonMax){
      found = key;
    }
  });
  return found;
}

/* ── Debounced moveend handler ───────────────────────── */
function onMapMoveEnd(){
  if(manualOverride) return;
  if(showAllOverride) return;

  var zoom = map.getZoom();
  var center = map.getCenter();
  var lat = center.lat;
  var lng = center.lng;

  if(zoom >= 5){
    /* Country-level: detect country */
    var code = detectCountryAt(lat, lng);
    if(code){
      if(code !== lastAutoCountry || currentFilter.type !== "country" || currentFilter.country !== code){
        lastAutoCountry = code;
        filterByCountry(code, {noPan:true});
        pulseMarker(code);
        sidebar.classList.remove("collapsed");
        sidebarToggle.innerHTML = "&#9664;";
      }
    } else if(!code){
      /* Zoomed in but no country matched */
      lastAutoCountry = null;
      var continent = detectContinentAt(lat, lng);
      if(continent === "europe"){
        filterByRegion("europe", {noPan:true});
      } else {
        showGlobalDatasets();
        document.getElementById("sidebarTitle").textContent = "No country detected";
        updateAutoDetectBanner(null, "Zoom in on a country");
      }
    }
  } else if(zoom >= 4){
    lastAutoCountry = null;
    /* Continental level */
    var continent = detectContinentAt(lat, lng);
    if(continent === "europe"){
      filterByRegion("europe", {noPan:true});
    } else {
      /* Other continent at medium zoom: show global */
      showGlobalDatasets();
      updateAutoDetectBanner(null, "Global (zoom in for country datasets)");
    }
  } else {
    /* World view */
    lastAutoCountry = null;
    showGlobalDatasets();
    updateAutoDetectBanner(null, "Global view — zoom in for country datasets");
  }
}

map.on("moveend", function(){
  clearTimeout(moveendTimer);
  moveendTimer = setTimeout(onMapMoveEnd, 300);
});

/* Reset manual override when user pans or zooms */
map.on("dragstart", function(){
  manualOverride = false;
});
map.on("zoomstart", function(){
  manualOverride = false;
});

    applySearch();
    updateStats("All");
  } else {
    /* Re-trigger auto-detect */
    lastAutoCountry = null;
    onMapMoveEnd();
  }
});

/* ── Legend ────────────────────────────────────────────── */
var legend = L.control({position:"bottomleft"});
legend.onAdd = function(){
  var div = L.DomUtil.create("div","info legend");
  div.style.cssText = "background:rgba(255,255,255,.92);padding:10px 14px;border-radius:6px;font-size:.78rem;line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,.15);border:1px solid #dce1e8";
  var dot = function(size,color){ return '<span style="display:inline-block;width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';margin-right:6px;vertical-align:middle"></span>'; };
  div.innerHTML =
    '<strong style="font-size:.82rem">National Datasets</strong><br>' +
    dot(7,"#bdc3c7") + ' None<br>' +
    dot(8,"#aed6f1") + ' 1–4<br>' +
    dot(10,"#85c1e9") + ' 5–8<br>' +
    dot(12,"#5dade2") + ' 9–12<br>' +
    dot(14,"#2e86c1") + ' 13–18<br>' +
    dot(16,"#1a5276") + ' 19–30<br>' +
    dot(18,"#0b3d5e") + ' 30+';
  return div;
};
legend.addTo(map);

})();
</script>
</body>
</html>
