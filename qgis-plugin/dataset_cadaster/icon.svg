<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Globe -->
  <circle cx="28" cy="28" r="22" fill="#2b8cbe" stroke="#1a5276" stroke-width="2"/>
  <!-- Globe lines - latitude -->
  <ellipse cx="28" cy="28" rx="22" ry="8" fill="none" stroke="#d4e6f1" stroke-width="1.2"/>
  <ellipse cx="28" cy="28" rx="22" ry="16" fill="none" stroke="#d4e6f1" stroke-width="1.2"/>
  <!-- Globe lines - longitude -->
  <ellipse cx="28" cy="28" rx="8" ry="22" fill="none" stroke="#d4e6f1" stroke-width="1.2"/>
  <line x1="6" y1="28" x2="50" y2="28" stroke="#d4e6f1" stroke-width="1.2"/>
  <line x1="28" y1="6" x2="28" y2="50" stroke="#d4e6f1" stroke-width="1.2"/>
  <!-- Magnifying glass handle -->
  <line x1="44" y1="44" x2="58" y2="58" stroke="#e67e22" stroke-width="5" stroke-linecap="round"/>
  <!-- Magnifying glass lens ring -->
  <circle cx="38" cy="38" r="12" fill="rgba(255,255,255,0.15)" stroke="#e67e22" stroke-width="3"/>
</svg>
